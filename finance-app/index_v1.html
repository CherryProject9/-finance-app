    <script>
        // Register Service Worker for PWA support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[FinanceOS] PWA Service Worker Registered'))
                    .catch(err => console.log('[FinanceOS] SW Registration Failed', err));
            });
        }
    </script>
    <script>
        console.log('[FinanceOS] Bootstrap v=120...');
        window.onerror = function(msg, url, line, col, error) {
            var div = document.createElement('div');
            div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,0,0,0.9);color:white;padding:20px;z-index:999999;font-family:monospace;font-size:14px;overflow:auto;';
            div.innerHTML = '<h1>Critical Error</h1>' +
                            '<p><b>Message:</b> ' + msg + '</p>' +
                            '<p><b>URL:</b> ' + url + '</p>' +
                            '<p><b>Line:</b> ' + line + ', <b>Col:</b> ' + col + '</p>' +
                            '<pre>' + (error && error.stack || '') + '</pre>' +
                            '<button onclick="location.reload()" style="background:white;color:black;padding:10px;border:none;border-radius:5px;margin-top:20px;">Reload App</button>';
            if (document.body) {
                document.body.appendChild(div);
            } else {
                document.write(div.outerHTML);
            }
            return false;
        };
    </script>
    <title>FinanceOS - Premium Personal Finance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="styles_v1.css">
    <style>
        /* --- Login UI Styles --- */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            background: #111;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .auth-logo {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .auth-subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .auth-button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-google { background: #fff; color: #000; }
        .btn-kakao { background: #FEE500; color: #3C1E1E; }
        .btn-email { background: #222; color: #fff; border: 1px solid #333; }
        .auth-button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .auth-divider {
            height: 1px;
            background: #222;
            margin: 24px 0;
            position: relative;
        }
        .auth-divider::after {
            content: 'OR';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 0 12px;
            color: #444;
            font-size: 10px;
            font-weight: 700;
        }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .auth-footer {
            margin-top: 24px;
            color: #666;
            font-size: 12px;
        }
        .auth-link {
            color: #6366F1;
            cursor: pointer;
            text-decoration: underline;
        }
        #auth-error {
            color: #ef4444;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }
    </style>
    <script>
        (function() {
            var savedTheme = localStorage.getItem('financeOS_theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
